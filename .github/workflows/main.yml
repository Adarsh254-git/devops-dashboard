name: DevOps Dashboard CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Backend Dependencies
        # This points exactly to the 'backend' folder from your screenshot
        run: npm install
        working-directory: ./backend

      - name: Run Build
        # This will run if you have a build script, otherwise it skips safely
        run: npm run build --if-present
        working-directory: ./backend
